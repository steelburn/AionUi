<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      #hit {
        width: 100%;
        height: 100%;
        cursor: grab;
      }
      #hit.dragging {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <div id="hit"></div>
    <script type="module" src="./petHitRenderer.ts"></script>
  </body>
</html>
